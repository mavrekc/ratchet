name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy src

      - run: uv run pytest -q
        env:
          REDIS_URL: redis://localhost:6379/15
          RATCHET_REQUIRE_REDIS: "1"

      - run: docker build -t ratchet:ci .
