name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy src

      - run: uv run pytest -q

      - run: docker build -t ratchet:ci .
